          type: string
        url:
          type: string
        types:
          type: array
          items:
            type: string

    PlaceDetailGoogleResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/PlaceDetailResult'
        status:
          type: string
          enum: [OK, NOT_FOUND, INVALID_REQUEST]

    PlaceDetailOsmResponse:
      $ref: '#/components/schemas/FeatureCollection'

    # ── Geocoding ─────────────────────────
    GeocodeResult:
      type: object
      properties:
        address:
          type: string
        address_components:
          type: array
          items:
            $ref: '#/components/schemas/AddressComponent'
        formatted_address:
          type: string
        geometry:
          type: object
          properties:
            location:
              $ref: '#/components/schemas/LatLng'
        name:
          type: string
        place_id:
          type: string
        types:
          type: array
          items:
            type: string

    GeocodeGoogleResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeResult'
        status:
          type: string
          enum: [OK, ZERO_RESULTS, INVALID_REQUEST]

    ReverseGeocodeGoogleResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/GeocodeResult'
        status:
          type: string
          enum: [OK, ZERO_RESULTS, INVALID_REQUEST]

    # ── Navigation ────────────────────────
    RouteStep:
      type: object
      properties:
        distance:
          $ref: '#/components/schemas/TextValue'
        duration:
          $ref: '#/components/schemas/TextValue'
        start_location:
          $ref: '#/components/schemas/LatLng'
        end_location:
          $ref: '#/components/schemas/LatLng'
        html_instructions:
          type: string
        maneuver:
          type: string
        polyline:
          type: object
          properties:
            points:
              type: string
        travel_mode:
          type: string

    RouteLeg:
      type: object
      properties:
        distance:
          $ref: '#/components/schemas/TextValue'
        duration:
          $ref: '#/components/schemas/TextValue'
        start_address:
          type: string
        end_address:
          type: string
        start_location:
          $ref: '#/components/schemas/LatLng'
        end_location:
          $ref: '#/components/schemas/LatLng'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RouteStep'

    Route:
      type: object
      properties:
        bounds:
          type: object
        legs:
          type: array
          items:
            $ref: '#/components/schemas/RouteLeg'
        overview_polyline:
          type: object
          properties:
            points:
              type: string
        summary:
          type: string
        warnings:
          type: array
          items:
            type: string
        waypoint_order:
          type: array
          items:
            type: integer

    DirectionsResponse:
      type: object
      properties:
        geocoded_waypoints:
          type: array
          items:
            type: object
            properties:
              geocoder_status:
                type: string
              place_id:
                type: string
        routes:
          type: array
          items:
            $ref: '#/components/schemas/Route'

    TextValue:
      type: object
      properties:
        text:
          type: string
        value:
          type: number

    DistanceMatrixEntry:
      type: object
      properties:
        distance:
          type: number
        time:
          type: integer
        from_index:
          type: integer
        to_index:
          type: integer
        date_time:
          type: string
          nullable: true

    DistanceMatrixResponse:
      type: object
      properties:
        sources_to_targets:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/DistanceMatrixEntry'
        locations:
          type: array
          items:
            type: object
            properties:
              lat:
                type: string
              lon:
                type: string
        units:
          type: string
          enum: [km, mi]
          default: km
        warnings:
          type: array
          items:
            type: string

    # ── NDAView ───────────────────────────
    NdaViewAssets:
      type: object
      properties:
        hd:
          $ref: '#/components/schemas/NdaViewAsset'
        sd:
          $ref: '#/components/schemas/NdaViewAsset'
        thumb:
          $ref: '#/components/schemas/NdaViewAsset'

    NdaViewAsset:
      type: object
      properties:
        href:
          type: string
          format: uri
        title:
          type: string
        type:
          type: string
        description:
          type: string
        roles:
          type: array
          items:
            type: string

    NdaViewFeature:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [Feature]
        geometry:
          $ref: '#/components/schemas/GeoJsonPoint'
        bbox:
          type: array
          items:
            type: number
        assets:
          $ref: '#/components/schemas/NdaViewAssets'
        asset_templates:
          type: object
        links:
          type: array
          items:
            type: object
        properties:
          type: object
          properties:
            datetime:
              type: string
              format: date-time
            created:
              type: string
              format: date-time
            width:
              type: integer
            height:
              type: integer
            view:azimuth:
              type: number
            ndaview_vn:status:
              type: string
            ndaview_vn:thumbnail:
              type: string
              format: uri
            ndaview_vn:image:
              type: string
              format: uri
            pers:interior_orientation:
              type: object
              properties:
                field_of_view:
                  type: integer
                camera_manufacturer:
                  type: string
                camera_model:
                  type: string

    NdaViewFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: '#/components/schemas/NdaViewFeature'
        links:
          type: array
          items:
            type: object

    # ── Optimized Route ───────────────────
    OptimizedRouteLocation:
      type: object
      properties:
        type:
          type: string
          enum: [break]
        lat:
          type: number
        lon:
          type: number
        side_of_street:
          type: string
          enum: [left, right]
        original_index:
          type: integer
          description: Index of this location in the original input array (before reordering)

    OptimizedRouteLegSummary:
      type: object
      properties:
        time:
          type: number
          description: Total travel time for this leg in seconds
        length:
          type: number
          description: Total distance for this leg in km (or miles if units=mi)
        cost:
          type: number
        has_time_restrictions:
          type: boolean
        has_toll:
          type: boolean
        has_highway:
          type: boolean
        has_ferry:
          type: boolean
        min_lat:
          type: number
        min_lon:
          type: number
        max_lat:
          type: number
        max_lon:
          type: number

    OptimizedRouteManeuver:
      type: object
      properties:
        type:
          type: integer
          description: Maneuver type code (3=start, 5=dest-right, 6=dest-left, 10=right, 15=left, etc.)
        instruction:
          type: string
        verbal_pre_transition_instruction:
          type: string
        verbal_succinct_transition_instruction:
          type: string
          nullable: true
        verbal_post_transition_instruction:
          type: string
          nullable: true
        verbal_transition_alert_instruction:
          type: string
          nullable: true
        street_names:
          type: array
          items:
            type: string
        time:
          type: number
          description: Duration of this maneuver in seconds
        length:
          type: number
          description: Distance of this maneuver in km
        cost:
          type: number
        begin_shape_index:
          type: integer
        end_shape_index:
          type: integer
        travel_mode:
          type: string
          example: "drive"
        travel_type:
          type: string
          example: "car"
        highway:
          type: boolean
          nullable: true
        verbal_multi_cue:
          type: boolean
          nullable: true
        roundabout_exit_count:
          type: integer
          nullable: true
        sign:
          type: object
          nullable: true
          properties:
            exit_number_elements:
              type: array
              items:
                type: object
                properties:
                  text:
                    type: string
            exit_branch_elements:
              type: array
              items:
                type: object
                properties:
                  text:
                    type: string
            exit_toward_elements:
              type: array
              items:
                type: object
                properties:
                  text:
                    type: string

    OptimizedRouteLeg:
      type: object
      properties:
        maneuvers:
          type: array
          items:
            $ref: '#/components/schemas/OptimizedRouteManeuver'
        summary:
          $ref: '#/components/schemas/OptimizedRouteLegSummary'
        shape:
          type: string
          description: Encoded polyline (Google Polyline format) for this leg

    OptimizedRouteSummary:
      type: object
      properties:
        time:
          type: number
          description: Total trip time in seconds
        length:
          type: number
          description: Total trip distance in km
        cost:
          type: number
        has_time_restrictions:
          type: boolean
        has_toll:
          type: boolean
        has_highway:
          type: boolean
        has_ferry:
          type: boolean
        min_lat:
          type: number
        min_lon:
          type: number
        max_lat:
          type: number
        max_lon:
          type: number
        status_message:
          type: string
          example: "Found route between points"
        status:
          type: integer
          description: 0 = success
        units:
          type: string
          example: "kilometers"
        language:
          type: string
          example: "en-US"

    OptimizedRouteResponse:
      type: object
      properties:
        trip:
          type: object
          properties:
            locations:
              type: array
              description: Locations in optimized visit order (original_index maps back to input)
              items:
                $ref: '#/components/schemas/OptimizedRouteLocation'
            legs:
              type: array
              description: One leg per pair of consecutive locations in the optimized order
              items:
                $ref: '#/components/schemas/OptimizedRouteLeg'
            summary:
              $ref: '#/components/schemas/OptimizedRouteSummary'

    # ── Forcodes ──────────────────────────
    ForcodeEncodeResponse:
      type: object
      properties:
        forcodes:
          type: string
          description: Generated Forcode string
          example: "HN4TZUZBPKRN0F"
        lat:
          type: number
          example: 20.990396
        lng:
          type: number
          example: 105.868825
        resolution:
          type: integer
          example: 13
        admin_code:
          type: string
          description: Vietnamese province/city code
          example: "HN"
        status:
          type: string
          enum: [OK]

    ForcodeDecodeResponse:
      type: object
      properties:
        forcodes:
          type: string
          example: "HN4TZUZBPKRN0F"
        lat:
          type: number
          nullable: true
          example: 20.990396
        lng:
          type: number
          nullable: true
          example: 105.868825
        resolution:
          type: integer
          nullable: true
          example: 13
        status:
          type: string
          enum: [OK, INVALID_FORCODES]